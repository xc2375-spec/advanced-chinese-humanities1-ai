<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Writing Studio | 写作工坊</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
/* ── Reset & Base ── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f6f8;color:#2c2c2c;min-height:100vh}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit}

/* ── Header ── */
.site-header{background:#1a1a2e;color:#fff;padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.site-header a.back{color:#aab;font-size:13px;white-space:nowrap}
.site-header a.back:hover{color:#fff}
.site-header h1{font-size:18px;font-weight:700;flex:1}
.site-header span{font-size:12px;opacity:.55}

/* ── Page Layout ── */
.page-wrap{max-width:1100px;margin:0 auto;padding:28px 20px}

/* ── Setup Bar ── */
.setup-bar{background:#fff;border-radius:12px;padding:20px 24px;margin-bottom:20px;display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.setup-bar label{font-size:12px;font-weight:700;color:#888;display:block;margin-bottom:5px}
.setup-bar input[type=text]{border:1.5px solid #ddd;border-radius:8px;padding:9px 14px;font-size:14px;width:220px;outline:none}
.setup-bar input[type=text]:focus{border-color:#c0392b}
.setup-bar select{border:1.5px solid #ddd;border-radius:8px;padding:9px 14px;font-size:14px;background:#fff;outline:none;min-width:220px}
.setup-bar select:focus{border-color:#c0392b}

/* ── Content Grid ── */
.content-grid{display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start}
@media(max-width:820px){.content-grid{grid-template-columns:1fr}}

/* ── Left Panel ── */
.left-panel{display:flex;flex-direction:column;gap:16px}

/* ── Prompt Card ── */
.panel-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.panel-card h2{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888;margin-bottom:14px}
.prompt-list{display:flex;flex-direction:column;gap:8px}
.prompt-item{display:flex;gap:10px;align-items:flex-start;cursor:pointer;padding:10px 12px;border-radius:8px;border:1.5px solid #eee;transition:border-color .15s,background .15s}
.prompt-item:hover{background:#fafafa;border-color:#ddd}
.prompt-item.selected{border-color:var(--accent,#c0392b);background:rgba(192,57,43,.05)}
.prompt-item input[type=radio]{margin-top:3px;accent-color:var(--accent,#c0392b)}
.prompt-item span{font-size:14px;line-height:1.55;color:#333}

/* ── Vocab Bank ── */
.vocab-toggle{background:none;border:none;font-size:13px;font-weight:700;color:var(--accent,#c0392b);padding:0;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.vocab-toggle::after{content:'▾';font-size:11px;transition:transform .2s}
.vocab-toggle.open::after{transform:rotate(-180deg)}
.vocab-chips{display:flex;flex-wrap:wrap;gap:7px;max-height:220px;overflow-y:auto}
.vocab-chip{background:#f7f7f7;border:1.5px solid #e8e8e8;border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;transition:border-color .15s,background .15s}
.vocab-chip:hover{background:#fff;border-color:var(--accent,#c0392b)}
.vocab-chip .zh{font-size:14px;font-weight:600}
.vocab-chip .py{color:#888;margin:0 4px}
.vocab-chip .en{color:#555}
.vocab-chips.hidden{display:none}

/* ── Right Panel (Writing Area) ── */
.right-panel{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;flex-direction:column;gap:16px}
.writing-header{display:flex;justify-content:space-between;align-items:center}
.writing-header h2{font-size:16px;font-weight:700;color:#2c2c2c}
.word-count{font-size:13px;color:#888}
.word-count span{font-weight:700;color:var(--accent,#c0392b)}
.selected-prompt-display{background:#fafafa;border-left:3px solid var(--accent,#c0392b);padding:10px 14px;border-radius:0 8px 8px 0;font-size:14px;color:#444;line-height:1.55;min-height:40px}
textarea#writing-input{width:100%;min-height:260px;border:1.5px solid #ddd;border-radius:10px;padding:14px;font-size:15px;line-height:1.8;resize:vertical;outline:none;font-family:inherit;color:#2c2c2c}
textarea#writing-input:focus{border-color:var(--accent,#c0392b)}

/* ── Action Buttons ── */
.action-row{display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;border:none;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--accent,#c0392b);color:#fff}
.btn-primary:hover:not(:disabled){opacity:.88}
.btn-secondary{background:#f0f0f0;color:#444}
.btn-secondary:hover:not(:disabled){background:#e5e5e5}
.btn-submit{background:#1a1a2e;color:#fff}
.btn-submit:hover:not(:disabled){opacity:.85}

/* ── Feedback Panel ── */
.feedback-panel{border:1.5px solid #e0e0e0;border-radius:10px;overflow:hidden}
.feedback-header{background:#f7f7f7;padding:10px 16px;font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #e0e0e0;display:flex;justify-content:space-between;align-items:center}
.feedback-body{padding:16px;font-size:14px;line-height:1.75;white-space:pre-wrap;color:#333;max-height:320px;overflow-y:auto}
.feedback-body.empty{color:#aaa;font-style:italic}
.loader{display:inline-block;width:16px;height:16px;border:2px solid #ddd;border-top-color:var(--accent,#c0392b);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Submit Result ── */
.submit-result{padding:12px 16px;border-radius:8px;font-size:14px;font-weight:500;display:none}
.submit-result.success{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.submit-result.error{background:#ffebee;color:#c62828;border:1px solid #ef9a9a}

/* ── Empty State ── */
.empty-state{background:#fff;border-radius:12px;padding:48px 24px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06);color:#aaa}
.empty-state svg{margin-bottom:12px;opacity:.3}
.empty-state p{font-size:15px}

/* ── Unit badge colors ── */
.unit-1{--accent:#c0392b}
.unit-2{--accent:#2e7d32}
</style>
</head>
<body>

<header class="site-header">
  <a class="back" href="index.html">← 首页</a>
  <h1>写作工坊 Writing Studio</h1>
  <span>Advanced Chinese for Humanities (I)</span>
</header>

<div class="page-wrap">

  <!-- ── Setup Bar ── -->
  <div class="setup-bar">
    <div>
      <label for="student-name">你的姓名 Your Name</label>
      <input type="text" id="student-name" placeholder="e.g. 张明 / Ming Zhang">
    </div>
    <div>
      <label for="lesson-select">选择课文 Select Lesson</label>
      <select id="lesson-select">
        <option value="">— 请选择 / Choose a lesson —</option>
        <optgroup label="Unit 1 · 上下五千年">
          <option value="1.0">1.0 开篇：天·地·人</option>
          <option value="1.1">1.1 第一课：黄帝的传说</option>
          <option value="1.2">1.2 第二课：孔子</option>
          <option value="1.3">1.3 第三课：司马迁和《史记》</option>
        </optgroup>
        <optgroup label="Unit 2 · 人文天下">
          <option value="2.0">2.0 开篇：人与世界</option>

          <option value="2.2">2.2 第二课：寻梦</option>
          <option value="2.3">2.3 第三课：聪明人和傻子和奴才</option>
        </optgroup>
      </select>
    </div>
  </div>

  <!-- ── Main Content (shown after lesson selected) ── -->
  <div id="main-content" style="display:none">
    <div class="content-grid" id="content-grid">

      <!-- Left Panel -->
      <div class="left-panel">

        <!-- Prompts -->
        <div class="panel-card">
          <h2>写作提示 Writing Prompts</h2>
          <div class="prompt-list" id="prompt-list"></div>
        </div>

        <!-- Vocab Bank -->
        <div class="panel-card">
          <button class="vocab-toggle open" id="vocab-toggle" onclick="toggleVocab()">词汇银行 Vocab Bank</button>
          <div class="vocab-chips" id="vocab-chips"></div>
        </div>

      </div>

      <!-- Right Panel -->
      <div class="right-panel">
        <div class="writing-header">
          <h2>开始写作 Start Writing</h2>
          <div class="word-count">字数：<span id="char-count">0</span></div>
        </div>

        <div class="selected-prompt-display" id="prompt-display">← 从左边选一个写作题目</div>

        <textarea id="writing-input" placeholder="在这里开始写作…&#10;&#10;提示：点击词汇银行中的词语可以复制到剪贴板。" oninput="updateCount()"></textarea>

        <div class="action-row">
          <button class="btn btn-primary" id="feedback-btn" onclick="getFeedback()" disabled>
            ✦ AI 反馈 Get Feedback
          </button>
          <button class="btn btn-secondary" onclick="clearWriting()">清空 Clear</button>
        </div>

        <!-- Feedback Panel -->
        <div class="feedback-panel" id="feedback-panel" style="display:none">
          <div class="feedback-header">
            <span>AI 写作反馈 · Writing Feedback</span>
            <span id="feedback-loader"></span>
          </div>
          <div class="feedback-body empty" id="feedback-body">反馈将在这里显示…</div>
        </div>

        <!-- Submit -->
        <div class="action-row">
          <button class="btn btn-submit" id="submit-btn" onclick="submitWork()" disabled>
            ↑ 提交作品 Submit
          </button>
        </div>
        <div class="submit-result" id="submit-result"></div>

      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div id="empty-state" class="empty-state">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    <p>请先选择课文，然后选择写作题目开始练习。</p>
  </div>

</div><!-- /page-wrap -->

// ══════════════════════════════════════════════════
// ③ STATE
// ══════════════════════════════════════════════════
let selectedLesson = null;
let selectedPromptIdx = null;
let latestFeedback = '';

// ══════════════════════════════════════════════════
// ④ LESSON SELECT
// ══════════════════════════════════════════════════
document.getElementById('lesson-select').addEventListener('change', function () {
  const id = this.value;
  if (!id) { showEmpty(); return; }
  loadLesson(id);
});

function loadLesson(id) {
  selectedLesson = id;
  selectedPromptIdx = null;
  latestFeedback = '';
  const L = LESSONS[id];
  const unit = L.unit;
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  const grid = document.getElementById('content-grid');
  grid.className = `content-grid unit-${unit}`;

  // Render prompts
  const pl = document.getElementById('prompt-list');
  pl.innerHTML = L.prompts.map((p, i) => `
    <label class="prompt-item" id="pi${i}" onclick="selectPrompt(${i})">
      <input type="radio" name="prompt" value="${i}">
      <span>${p}</span>
    </label>`).join('');

  // Render vocab
  const vc = document.getElementById('vocab-chips');
  vc.innerHTML = L.vocab.map(v => `
    <div class="vocab-chip" title="点击复制 Click to copy" onclick="copyVocab('${v.w}')">
      <span class="zh">${v.w}</span><span class="py">${v.p}</span><span class="en">${v.e}</span>
    </div>`).join('');

  // Reset writing area
  document.getElementById('writing-input').value = '';
  document.getElementById('char-count').textContent = '0';
  document.getElementById('prompt-display').textContent = '← 从左边选一个写作题目';
  document.getElementById('feedback-panel').style.display = 'none';
  document.getElementById('feedback-btn').disabled = true;
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('submit-result').style.display = 'none';
  latestFeedback = '';
}

function showEmpty() {
  document.getElementById('empty-state').style.display = 'block';
  document.getElementById('main-content').style.display = 'none';
}

// ══════════════════════════════════════════════════
// ⑤ PROMPT SELECT
// ══════════════════════════════════════════════════
function selectPrompt(idx) {
  selectedPromptIdx = idx;
  document.querySelectorAll('.prompt-item').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
  document.getElementById('prompt-display').textContent = LESSONS[selectedLesson].prompts[idx];
  updateFeedbackBtn();
}

// ══════════════════════════════════════════════════
// ⑥ WORD COUNT
// ══════════════════════════════════════════════════
function updateCount() {
  const text = document.getElementById('writing-input').value;
  const count = (text.match(/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]/g) || []).length;
  document.getElementById('char-count').textContent = count;
  updateFeedbackBtn();
}

function updateFeedbackBtn() {
  const text = document.getElementById('writing-input').value;
  const count = (text.match(/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]/g) || []).length;
  const hasPrompt = selectedPromptIdx !== null;
  document.getElementById('feedback-btn').disabled = !(hasPrompt && count >= 30);
}

function clearWriting() {
  document.getElementById('writing-input').value = '';
  document.getElementById('char-count').textContent = '0';
  document.getElementById('feedback-btn').disabled = true;
}

// ══════════════════════════════════════════════════
// ⑦ VOCAB COPY
// ══════════════════════════════════════════════════
function copyVocab(word) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(word).then(() => showCopyToast(word));
  } else {
    const ta = document.createElement('textarea');
    ta.value = word; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); showCopyToast(word);
  }
}
function showCopyToast(word) {
  let t = document.getElementById('copy-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'copy-toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;z-index:9999;transition:opacity .3s';
    document.body.appendChild(t);
  }
  t.textContent = `"${word}" 已复制 Copied`;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 1800);
}

// ══════════════════════════════════════════════════
// ⑧ VOCAB TOGGLE
// ══════════════════════════════════════════════════
function toggleVocab() {
  const chips = document.getElementById('vocab-chips');
  const btn = document.getElementById('vocab-toggle');
  chips.classList.toggle('hidden');
  btn.classList.toggle('open');
}

// ══════════════════════════════════════════════════
// ⑨ AI FEEDBACK (via Cloudflare Worker)
// ══════════════════════════════════════════════════
async function getFeedback() {
  const writing = document.getElementById('writing-input').value.trim();
  const prompt = LESSONS[selectedLesson].prompts[selectedPromptIdx];
  if (!writing || !prompt) return;

  const btn = document.getElementById('feedback-btn');
  const loader = document.getElementById('feedback-loader');
  const body = document.getElementById('feedback-body');
  const panel = document.getElementById('feedback-panel');

  btn.disabled = true;
  btn.textContent = '分析中…';
  loader.innerHTML = '<span class="loader"></span>';
  panel.style.display = 'block';
  body.className = 'feedback-body empty';
  body.textContent = '正在请求 AI 反馈，请稍候…';

  try {
    const resp = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        writing,
        promptText: prompt,
        lessonId: selectedLesson,
        lessonTitle: LESSONS[selectedLesson].title
      })
    });
    const data = await resp.json();
    if (data.feedback) {
      latestFeedback = data.feedback;
      body.className = 'feedback-body';
      body.textContent = data.feedback;
      document.getElementById('submit-btn').disabled = false;
    } else {
      body.textContent = '反馈获取失败，请重试。Error: ' + (data.error || 'unknown');
    }
  } catch (err) {
    body.textContent = '无法连接到反馈服务。请确认 Cloudflare Worker 已部署。\n\n' + err.message;
  } finally {
    btn.disabled = false;
    btn.textContent = '✦ AI 反馈 Get Feedback';
    loader.innerHTML = '';
    updateFeedbackBtn();
  }
}

// ══════════════════════════════════════════════════
// ⑩ SUBMIT TO SUPABASE
// ══════════════════════════════════════════════════
async function submitWork() {
  const name = document.getElementById('student-name').value.trim();
  const writing = document.getElementById('writing-input').value.trim();
  const prompt = selectedPromptIdx !== null ? LESSONS[selectedLesson].prompts[selectedPromptIdx] : '';
  const charCount = (writing.match(/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]/g) || []).length;
  const result = document.getElementById('submit-result');

  if (!name) { alert('请先输入你的姓名 Please enter your name.'); return; }
  if (!writing) { alert('请先写一些内容 Please write something first.'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '提交中…';

  try {
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    const { error } = await supabase.from('writing_submissions').insert({
      student_name: name,
      lesson_id: selectedLesson,
      lesson_title: LESSONS[selectedLesson].title,
      prompt_index: selectedPromptIdx,
      prompt_text: prompt,
      writing_text: writing,
      char_count: charCount,
      ai_feedback: latestFeedback || null
    });
    if (error) throw error;
    result.className = 'submit-result success';
    result.style.display = 'block';
    result.textContent = '✓ 作品已成功提交！Your writing has been submitted successfully.';
  } catch (err) {
    result.className = 'submit-result error';
    result.style.display = 'block';
    result.textContent = '提交失败 Submission failed: ' + err.message;
    btn.disabled = false;
    btn.textContent = '↑ 提交作品 Submit';
  } finally {
    if (!result.classList.contains('error')) {
      btn.textContent = '✓ 已提交';
    }
  }
}
</script>
